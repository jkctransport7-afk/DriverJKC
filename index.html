<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Driver Safety</title>
    <style>
        /* ใช้ dvh (Dynamic Viewport Height) เพื่อให้ขนาดหด-ขยายหลบแถบ Chrome อัตโนมัติ */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            height: -webkit-fill-available; /* สำหรับรองรับ Safari/Chrome บนมือถือบางรุ่น */
            height: 100dvh; 
            overflow: hidden;
            background-color: #0c1524;
        }
        
        iframe {
            border: none;
            display: block;
            scrolling: yes;
            
            /* ใช้หน่วย % ร่วมกับ dvh เพื่อให้ปรับตัวตามขนาดพื้นที่เหลือจริง ไม่ใช่ขนาดหน้าจอทั้งหมด */
            width: 117.65%;  
            height: 117.65%; 
            
            transform: scale(0.85); 
            transform-origin: 0 0; 
        }
    </style>
</head>
<body>
    <iframe scrolling="yes" src="https://script.google.com/macros/s/AKfycbxaueozL4jTM7F8R9XkQS3e_GGHLEr3fyEtnYxlz2sX1eXKXVHZhfG8JbKOO-jNApUX/exec" frameborder="0"></iframe>
</body>
</html>
