<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>เว็บแอป</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* ใส่พื้นหลังสีดำกันขอบขาวตอนย่อสเกล */
        }
        
        /* สั่งให้ iframe ขยายขนาดเผื่อไว้ก่อนย่อ */
        iframe {
            border: none;
            display: block;
            scrolling: yes;
            
            /* วิธีโกงสเกลย่อขนาดแอป: บีบให้ระบบคิดว่าเปิดบนจอที่ใหญ่ขึ้น 200% แล้วหดกลับลงมา */
            width: 100%;  /* สูตรคำนวณ: (100 / สเกลที่ต้องการ) เช่น 100 / 0.5 = 200% */
            height: 100vh;
            
            transform: scale(0.8); /* ปรับตัวเลขตรงนี้เพื่อย่อขนาด (0.5 คือ ย่อเหลือ 50%) */
            transform-origin: 0 0; /* ยึดมุมซ้ายบนเป็นหลักในการย่อ */
        }
    </style>
</head>
<body>
    <iframe scrolling="yes" src="https://script.google.com/macros/s/AKfycbxaueozL4jTM7F8R9XkQS3e_GGHLEr3fyEtnYxlz2sX1eXKXVHZhfG8JbKOO-jNApUX/exec" frameborder="0"></iframe>
</body>
</html>
