<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driver Safety Platform</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0c1524; /* ปรับพื้นหลังให้เป็นสีน้ำเงินเข้มโทนเดียวกับแดชบอร์ดของคุณเพื่อความเนียนตา */
        }
        
        /* สั่งให้ iframe ขยายขนาดเผื่อไว้ก่อนย่อ */
        iframe {
            border: none;
            display: block;
            scrolling: yes;
            
            /* ปรับสูตรคำนวณใหม่สำหรับสเกล 85% เพื่อแก้ปัญหาจอลดและแสดงผลได้ลงตัวที่สุด (100 / 0.85 = 117.65%) */
            width: 117.65%;  
            height: 117.65vh;
            
            transform: scale(0.85); /* เปลี่ยนจาก 0.5 เป็น 0.85 เพื่อไม่ให้แอปตัวเล็กเกินไปจนเหลือขอบเทา */
            transform-origin: 0 0; /* ยึดมุมซ้ายบนเป็นหลักในการย่อ */
        }
    </style>
</head>
<body>
    <iframe scrolling="yes" src="https://script.google.com/macros/s/AKfycbxaueozL4jTM7F8R9XkQS3e_GGHLEr3fyEtnYxlz2sX1eXKXVHZhfG8JbKOO-jNApUX/exec" frameborder="0"></iframe>
</body>
</html>
